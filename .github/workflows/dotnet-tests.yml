name: Playwright .NET Tests

on:
  push:
    branches: [ main ]
  pull_request: 
    branches: [ main ]
    
jobs: 
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Restore dependencies
        run: dotnet restore
        
      - name: Build
        run:  dotnet build --no-restore
        
      - name: Install Playwright browsers
        run:  pwsh PlaywrightFundamentalsLab.Tests/bin/Debug/net10.0/playwright.ps1 install --with-deps
        
      - name: Run tests
        run:  dotnet test --no-build
        
      - name: Upload trace artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with: 
          name: playwright-traces
          path: PlaywrightFundamentalsLab.Tests/bin/Debug/net10.0/playwright-traces/
